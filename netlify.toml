# netlify.toml
# HojoSearch 島根版 - Netlify設定

[build]
  publish = "."
  functions = "netlify/functions"

# Netlify Dev（ローカル開発）設定
[dev]
  port = 8888
  autoLaunch = false

# セキュリティヘッダー
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Functions のキャッシュ無効化
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"

# update-subsidies: 初回セットアップのみGemini呼び出し（通常はFirestoreから即返却）
[functions.update-subsidies]
  timeout = 26

# scheduled-update: 毎週月曜 6:00 JST（= 日曜 21:00 UTC）に自動実行
[functions.scheduled-update]
  schedule = "0 21 * * 0"
